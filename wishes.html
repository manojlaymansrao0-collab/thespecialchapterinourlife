/* NAVBAR */

nav{

top:0;
background:rgba(8,18,45,.85);

justify-content:space-between;
align-items:center;

z-index:1000;

.logo{

font-size:2rem;
color:#5DE4FF;
text-shadow:0 0 15px rgba(93,228,255,.5);
}

nav a{
text-decoration:none;
color:#C8D9FF;
font-weight:600;
transition:.3s;
}

nav a:hover{
color:#5DE4FF;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px 40px;
}

.hero h1{
font-size:4rem;
font-family:'Dancing Script',cursive;
color:#5DE4FF;
text-shadow:0 0 20px rgba(93,228,255,.4);
}

.hero p{
margin-top:10px;
font-size:1.1rem;
color:#B8C8E8;
}

/* LETTER */

.container{
padding:30px 10%;
}

.letter{
background:rgba(15,28,60,.9);
max-width:900px;
margin:auto;
padding:50px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,.4);
border:1px solid rgba(93,228,255,.15);
}

.letter h2{
color:#5DE4FF;
margin-bottom:25px;
}

#letterText{
line-height:2;
font-size:1.1rem;
white-space:pre-line;
min-height:400px;
color:#EAF2FF;
}

.cursor{
display:inline-block;
color:#5DE4FF;
animation:blink .8s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

.signature{
margin-top:40px;
font-family:'Dancing Script',cursive;
font-size:2rem;
color:#5DE4FF;
opacity:0;
transition:1s;
}

.signature.show{
opacity:1;
}

.quote{
margin-top:25px;
text-align:center;
font-style:italic;
color:#9DB0D7;
opacity:0;
transition:1s;
}

.quote.show{
opacity:1;
}

/* FOOTER */

footer{
margin-top:60px;
background:linear-gradient(135deg,#08122D,#10204A);

.freelance-footer{

    padding:15px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    border-top:1px solid rgba(255,255,255,.1);
}

.freelance-footer span{
    color:#D7E5FF;
    font-size:.95rem;
}

.mini-btn{
    text-decoration:none;
    padding:10px 18px;

    font-size:.9rem;
    font-weight:600;
    transition:.3s;

.whatsapp{

.email{

}

}

}

}

<script>

const letter = `🎉 **Happy Birthday to the brother I never expected to find in college!** 🎂✨

What started as a simple friendship 🤝 turned into a bond that feels like family ❤️.

When we first met in college 🎓, I never imagined that a normal friendship would become such a special part of my life. From random conversations 🗣️ to endless laughs 😂, from small moments to unforgettable memories 📸, every moment with you became something worth remembering ✨.

Through laughter 😂, memories 📸, challenges 💪, and countless conversations, you've become more than a friend — you've become my brother by heart 🫂.

Thank you for always being there 🤍, for supporting me, encouraging me, and making college days more special 🏫✨. The time we spent together with our friends, the fun moments, and all the memories we created will always have a special place in my heart ❤️.

Some people enter our lives as friends 🤝 and slowly become family ❤️. Meeting you in college 🎓 was truly one of the best things that happened to me 🌟.

A true bond is not about how long we know someone, but about the memories, trust, and happiness we share together 💫. And I'm grateful for every moment we've shared 🤍.

Happy Birthday to my brother by choice 🥳, my partner in memories 📸, and one of the most important people in my life ❤️.

Wishing you endless happiness 😊, success 🚀, good health 💙, and a year full of blessings 🙏✨.

May this new year of your life bring you more achievements 🏆, beautiful moments 🌟, and countless reasons to smile 😄.

🎂 **Have an amazing birthday, brother! Always stay the same ❤️🥳**


`;

const letterText = document.getElementById("letterText");
const skipBtn = document.getElementById("skipBtn");
const signature = document.getElementById("signature");
const quote = document.getElementById("quote");

let i = 0;
let typingFinished = false;

function finishLetter(){
    letterText.innerHTML = letter;
    signature.classList.add("show");
    quote.classList.add("show");
    skipBtn.style.display = "none";
    typingFinished = true;
}

function typeWriter(){

    if(typingFinished) return;

    if(i < letter.length){

        letterText.innerHTML =
        letter.substring(0,i+1) +
        '<span class="cursor">|</span>';

        i++;

        setTimeout(typeWriter,35);

    }else{

        finishLetter();

    }
}

skipBtn.addEventListener("click", () => {
    finishLetter();
});

window.onload = () => {
    setTimeout(typeWriter,800);
};
</script>
